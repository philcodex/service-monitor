<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Status Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .url-card { 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.08); 
        }
        .url-text { font-weight: 600; color: #2d3436; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <h2 class="mb-4">Service Monitor</h2>
        
        <div id="results">
            <div class="url-card">
                <span class="url-text">https://www.google.com</span>
                <button class="btn btn-primary btn-sm" onclick="checkUrl('https://www.google.com', this)">Check Status</button>
            </div>
            
            <div class="url-card">
                <span class="url-text">https://api.github.com</span>
                <button class="btn btn-primary btn-sm" onclick="checkUrl('https://api.github.com', this)">Check Status</button>
            </div>
            <div class="url-card">
                <span class="url-text">https://httpbin.org/status/500</span>
                <button class="btn btn-primary btn-sm" onclick="checkUrl('https://httpbin.org/status/500', this)">Check Status</button>
            </div>
            <div class="url-card">
                <span class="url-text">https://support.stripe.com</span>
                <button class="btn btn-primary btn-sm" onclick="checkUrl('https://support.stripe.com', this)">Check Status</button>
            </div>
            <div class="url-card">
                <span class="url-text">https://httpbin.org/status/404</span>
                <button class="btn btn-primary btn-sm" onclick="checkUrl('https://httpbin.org/status/404', this)">Check Status</button>
            </div>
        </div>
    </div>

    <script>
        async function checkUrl(url, btn) {
            btn.disabled = true;
            btn.innerText = "Checking...";
            
            try {
                // Using 'no-cors' to ping the service
                await fetch(url, { mode: 'no-cors', cache: 'no-cache' });
                
                btn.className = 'btn btn-success btn-sm';
                btn.innerText = "ONLINE";
            } catch (err) {
                btn.className = 'btn btn-danger btn-sm';
                btn.innerText = "OFFLINE";
                console.error("Fetch failed:", err);
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    btn.className = 'btn btn-primary
